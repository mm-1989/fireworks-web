name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最小権限: build 段階は read のみ、deploy 段階で pages 書き込みと OIDC トークン
permissions:
  contents: read
  pages: write
  id-token: write

# 並行デプロイ抑止。push 連打時は直近のみ実行
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
