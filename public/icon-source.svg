<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景: 深い夜空 -->
  <rect width="512" height="512" fill="#0b0b1e"/>

  <!-- 花火A: 大きなピンク球 (中央) -->
  <g transform="translate(256 230)">
    <circle r="8" fill="#ffffff"/>
    <g stroke="#ff4fa3" stroke-width="5" stroke-linecap="round" opacity="0.95">
      <!-- 16方向の放射線 -->
      <line x1="0" y1="0" x2="140" y2="0"/>
      <line x1="0" y1="0" x2="-140" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="140"/>
      <line x1="0" y1="0" x2="0" y2="-140"/>
      <line x1="0" y1="0" x2="99" y2="99"/>
      <line x1="0" y1="0" x2="-99" y2="99"/>
      <line x1="0" y1="0" x2="99" y2="-99"/>
      <line x1="0" y1="0" x2="-99" y2="-99"/>
      <line x1="0" y1="0" x2="130" y2="54"/>
      <line x1="0" y1="0" x2="-130" y2="54"/>
      <line x1="0" y1="0" x2="130" y2="-54"/>
      <line x1="0" y1="0" x2="-130" y2="-54"/>
      <line x1="0" y1="0" x2="54" y2="130"/>
      <line x1="0" y1="0" x2="-54" y2="130"/>
      <line x1="0" y1="0" x2="54" y2="-130"/>
      <line x1="0" y1="0" x2="-54" y2="-130"/>
    </g>
    <!-- 粒子 (先端) -->
    <g fill="#ffd1e8">
      <circle cx="140" cy="0" r="7"/>
      <circle cx="-140" cy="0" r="7"/>
      <circle cx="0" cy="140" r="7"/>
      <circle cx="0" cy="-140" r="7"/>
      <circle cx="99" cy="99" r="6"/>
      <circle cx="-99" cy="99" r="6"/>
      <circle cx="99" cy="-99" r="6"/>
      <circle cx="-99" cy="-99" r="6"/>
    </g>
  </g>

  <!-- 花火B: 小さな黄色 (左下) -->
  <g transform="translate(110 400)">
    <circle r="5" fill="#ffffff"/>
    <g stroke="#ffd24a" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="0" x2="55" y2="0"/>
      <line x1="0" y1="0" x2="-55" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="55"/>
      <line x1="0" y1="0" x2="0" y2="-55"/>
      <line x1="0" y1="0" x2="39" y2="39"/>
      <line x1="0" y1="0" x2="-39" y2="39"/>
      <line x1="0" y1="0" x2="39" y2="-39"/>
      <line x1="0" y1="0" x2="-39" y2="-39"/>
    </g>
  </g>

  <!-- 花火C: 小さな水色 (右下) -->
  <g transform="translate(410 410)">
    <circle r="5" fill="#ffffff"/>
    <g stroke="#6cd9ff" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="0" x2="50" y2="0"/>
      <line x1="0" y1="0" x2="-50" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="50"/>
      <line x1="0" y1="0" x2="0" y2="-50"/>
      <line x1="0" y1="0" x2="35" y2="35"/>
      <line x1="0" y1="0" x2="-35" y2="35"/>
      <line x1="0" y1="0" x2="35" y2="-35"/>
      <line x1="0" y1="0" x2="-35" y2="-35"/>
    </g>
  </g>

  <!-- 星 (少数) -->
  <g fill="#ffffffaa">
    <circle cx="60" cy="80" r="2"/>
    <circle cx="450" cy="60" r="2"/>
    <circle cx="380" cy="140" r="1.5"/>
    <circle cx="150" cy="170" r="1.5"/>
    <circle cx="470" cy="220" r="2"/>
  </g>
</svg>
